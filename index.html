    <script>
      ;(function () {
        var el = document.querySelector('script[type="module"]')
        var src = el && el.getAttribute('src')
        if (!src || src.indexOf('/src/main') === -1) return
        var host = location.hostname
        var port = location.port
        var isViteDev =
          host === 'localhost' ||
          host === '127.0.0.1' ||
          port === '5173' ||
          port === '4173'
        if (isViteDev) return
        var r = document.getElementById('root')
        if (!r) return
        r.innerHTML =
          '<p style="margin:1.25rem;font:600 14px system-ui,sans-serif;max-width:46rem;line-height:1.55;border:4px solid #000;padding:1rem">' +
          '<strong>Wrong file on the server.</strong> This page still loads the Vite <em>source</em> entry (<code>/src/main.tsx</code>). Apache does not serve that path, so the app never starts.<br><br>' +
          '<strong>Fix:</strong> On Cloudways, your web root must be the <strong>built</strong> output: after <code>npm run build</code>, copy everything from <code>dist/</code> into <code>public_html</code> (especially <code>index.html</code> and the <code>assets/</code> folder). The built <code>index.html</code> references <code>/assets/index-….js</code>, not <code>/src/main.tsx</code>. Use <code>bash ./cloudways-deploy.sh</code> with <code>SHIPORKICK_CLOUDWAYS_DEPLOY=1</code> as in <code>CLOUDWAYS_NEXT_STEPS.md</code>.</p>'
      })()
